<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Compare CPU scheduling algorithms on the same workload.">
    <title>Compare — OS-EL</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body class="compare-page">
    <nav class="site-nav">
        <a href="/" class="brand">OS-EL<span class="brand-sub"> Lab</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/ai_scheduler">AI Scheduler</a>
            <a href="/fcfs">FCFS</a>
            <a href="/sjf">SJF</a>
            <a href="/roundrobin">Round Robin</a>
            <a href="/compare" class="active nav-cta">Compare</a>
        </div>
    </nav>

    <div class="app-container">
        <div class="surface-card compare-hero">
            <h1>Algorithm comparison</h1>
            <p class="sub">Same process set, four policies. Charts use identical scaling so you can compare wait and turnaround fairly.</p>
            <button type="button" class="btn primary-btn" onclick="runAll()">Run all algorithms</button>
        </div>

        <div class="compare-grid" id="compare-container">
            <div class="compare-placeholder">
                Use the button above to fetch results from the API and render Gantt timelines.
            </div>
        </div>
    </div>

    <script src="/js/processStore.js"></script>
    <script src="/js/ganttChart.js"></script>
    <script src="/js/compare.js"></script>
</body>
</html>
