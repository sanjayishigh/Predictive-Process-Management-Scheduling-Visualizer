<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Algorithms | OS-EL</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <style>
        .compare-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        
        .algo-section {
            padding: 1.5rem;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
        }
        
        .winner-section {
            border-color: var(--accent-primary);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.05));
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
            position: relative;
        }
        
        .winner-section::before {
            content: "🏆 WINNER (Lowest Wait)";
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--accent-primary);
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .algo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .algo-stats span {
            margin-left: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="glass-nav">
        <div class="logo">OS-EL<span class="highlight"></span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="ai_scheduler.html">AI Scheduler</a>
            <a href="fcfs.html">FCFS</a>
            <a href="sjf.html">SJF</a>
            <a href="roundrobin.html">Round Robin</a>
            <a href="compare.html" class="active highlight-link">Compare &rarr;</a>
        </div>
    </nav>

    <div class="app-container" style="display: block;">
        <div class="glass-panel" style="margin-bottom: 2rem; text-align: center;">
            <h1 style="color:var(--accent-primary); margin-bottom: 0.5rem;">The Ultimate Benchmark</h1>
            <p style="color:var(--text-secondary);">Comparing AI Predictive Model against traditional scheduling algorithms.</p>
            <div style="margin-top: 1rem;">
                <button class="btn primary-btn" onclick="runAll()">Simulate All Algorithms Sync</button>
            </div>
        </div>

        <div class="compare-grid" id="compare-container">
            <!-- Dynamically populated by JS -->
            <div style="text-align:center; padding: 3rem; color: var(--text-secondary);">
                Click "Simulate All Algorithms" to begin the benchmark
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./js/processStore.js"></script>
    <script src="./js/ganttChart.js"></script>
    <script src="./js/compare.js"></script>
</body>
</html>
