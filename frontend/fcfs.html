<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="First Come First Served CPU scheduling with Gantt chart.">
    <title>FCFS — OS-EL</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <nav class="site-nav">
        <a href="/" class="brand">OS-EL<span class="brand-sub"></span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/ai_scheduler">AI Scheduler</a>
            <a href="/fcfs" class="active">FCFS</a>
            <a href="/sjf">SJF</a>
            <a href="/roundrobin">Round Robin</a>
            <a href="/compare" class="nav-cta">Compare</a>
        </div>
    </nav>

    <div class="app-container">
        <header class="page-intro">
            <h1>First come, first served</h1>
            <p>Processes run in strict arrival order. Non-preemptive: each job runs to completion before the next starts.</p>
        </header>

        <aside class="sidebar surface-card">
            <h3>Inputs</h3>
            <div class="input-group">
                <label for="arrival">Arrival time</label>
                <input type="number" id="arrival" placeholder="0" min="0">
            </div>
            <div class="input-group">
                <label for="burst">Burst time</label>
                <input type="number" id="burst" placeholder="5" min="1">
            </div>
            <button type="button" class="btn secondary-btn" style="width:100%" onclick="handleAddProcess()">Add process</button>
            <hr class="divider">
            <button type="button" class="btn primary-btn" style="width:100%" onclick="runScheduler()">Run FCFS</button>
        </aside>

        <main class="main-content">
            <div class="surface-card gantt-panel">
                <h2>Gantt chart</h2>
                <div id="gantt-chart"></div>
            </div>
            <div class="surface-card">
                <h2>Performance metrics</h2>
                <div id="metrics-container"></div>
            </div>
            <div class="surface-card">
                <h2>Process list</h2>
                <div id="process-table-container"></div>
            </div>
        </main>
    </div>

    <script src="/js/processStore.js"></script>
    <script src="/js/ganttChart.js"></script>
    <script src="/js/fcfs.js"></script>
</body>
</html>
